service: aws-resilient-task-service

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  stage: dev
  environment:
    TASKS_TABLE: tasks
    TASK_QUEUE_URL: !Ref TaskQueue
    PROCESSING_TIME_MS: '3000'
    LAMBDA_TIMEOUT: '30'
    MAX_RETRIES: '2'
    HMAC_SECRET: ${ssm:/aws-resilient-task-service/hmac-secret}
    LOG_LEVEL: info
  apiGateway:
    throttle:
      rateLimit: 1000
      burstLimit: 2000
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource:
            - !GetAtt TasksTable.Arn
            - !Sub '${TasksTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - dynamodb:GetRecords
            - dynamodb:GetShardIterator
            - dynamodb:DescribeStream
            - dynamodb:ListStreams
          Resource: !GetAtt TasksTable.StreamArn
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt TaskQueue.Arn
            - !GetAtt TaskDLQ.Arn

plugins:
  - serverless-offline

functions:
  api:
    handler: dist/lambda.handler
    timeout: 30
    events:
      - http:
          path: tasks
          method: post
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref CognitoAuthorizer
      - http:
          path: tasks/status/{taskId}
          method: get
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref CognitoAuthorizer

  taskProcessor:
    handler: dist/lambdas/task-processor.handler
    timeout: 30
    reservedConcurrency: 10 # Maximum Concurrency
    events:
      - sqs:
          arn: !GetAtt TaskQueue.Arn
          batchSize: 5
          maximumBatchingWindow: 30 # High Throughput Optimization
          functionResponseType: ReportBatchItemFailures

  dlqProcessor:
    handler: dist/lambdas/dlq-processor.handler
    timeout: 30
    events:
      - sqs:
          arn: !GetAtt TaskDLQ.Arn
          batchSize: 1

resources:
  Resources:
    # ── DynamoDB ──────────────────────────────────────────────────────────────
    TasksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TASKS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: taskId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: taskId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_IMAGE

    # ── SQS ───────────────────────────────────────────────────────────────────
    EmergencyDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-emergency-dlq-${sls:stage}

    TaskDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-task-dlq-${sls:stage}
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt EmergencyDLQ.Arn
          maxReceiveCount: 3

    TaskQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-task-queue-${sls:stage}
        VisibilityTimeout: 180 # lambdaTimeout * 6 = 30 * 6
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt TaskDLQ.Arn
          maxReceiveCount: 3

    # ── Cognito ───────────────────────────────────────────────────────────────
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-user-pool-${sls:stage}

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-client
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH

    TaskUsersGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: task-users
        UserPoolId: !Ref CognitoUserPool

    # ── EventBridge Pipe ─────────────────────────────────────────────────────
    PipeRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:service}-pipe-role-${sls:stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: pipes.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: PipePolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetRecords
                    - dynamodb:GetShardIterator
                    - dynamodb:DescribeStream
                    - dynamodb:ListStreams
                  Resource: !GetAtt TasksTable.StreamArn
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource: !GetAtt TaskQueue.Arn

    TaskStreamToPipeline:
      Type: AWS::Pipes::Pipe
      Properties:
        Name: ${self:service}-dynamo-to-sqs-${sls:stage}
        RoleArn: !GetAtt PipeRole.Arn
        Source: !GetAtt TasksTable.StreamArn
        SourceParameters:
          DynamoDBStreamParameters:
            StartingPosition: LATEST
          FilterCriteria:
            Filters:
              - Pattern: '{"eventName": ["INSERT"]}'
        Target: !GetAtt TaskQueue.Arn

    # ── CloudWatch Alarm ─────────────────────────────────────────────────────
    EmergencyDLQAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-emergency-dlq-not-empty-${sls:stage}
        AlarmDescription: 'CRITICAL: messages in Emergency DLQ — manual intervention required'
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value: !GetAtt EmergencyDLQ.QueueName
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    # ── CloudWatch Log Groups ─────────────────────────────────────────────────
    ApiLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-api-${sls:stage}
        RetentionInDays: 14

    TaskProcessorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-taskProcessor-${sls:stage}
        RetentionInDays: 14

    DlqProcessorLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-dlqProcessor-${sls:stage}
        RetentionInDays: 14

    # ── API Gateway Authorizer ────────────────────────────────────────────────
    CognitoAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: CognitoAuthorizer
        Type: COGNITO_USER_POOLS
        ProviderARNs:
          - !GetAtt CognitoUserPool.Arn
        RestApiId: !Ref ApiGatewayRestApi
        IdentitySource: method.request.header.Authorization
